name: Publish to npm

# Publishes when you cut a GitHub Release. Tag the release vX.Y.Z to match
# package.json's version — the build runs via the "prepare" script on npm publish.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-latest # package declares os:darwin; npm ci rejects linux
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC): no NPM_TOKEN. npm authenticates via the
      # id-token below, granted to the configured GitHub repo+workflow on npmjs.com.
      # OIDC token exchange requires npm CLI >= 11.5.1, newer than what ships
      # with node 22 — upgrade first, then publish with the upgraded binary.
      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
