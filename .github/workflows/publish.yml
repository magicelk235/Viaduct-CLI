name: Publish to npm

# Publishes when you cut a GitHub Release. Tag vX.Y.Z to match package.json.
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. The trust is
# configured on npmjs.com for magicelk235/Viaduct-CLI + this workflow file.
on:
  release:
    types: [published]

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  publish:
    runs-on: macos-latest # package is os:darwin; npm ci rejects linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # OIDC needs >= 22.14; npm bundled here is >= 11.5.1
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
