name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # CRITICAL: Allows GitHub to request the OIDC token from npm

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Make sure you are using a recent version of npm
      - run: npm install -g npm@latest
      
      - run: npm ci
      - run: npm test
      
      # The --provenance flag securely links the published package to this specific workflow run
      - run: npm publish --provenance --access public
