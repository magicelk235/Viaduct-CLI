name: Publish to npm

# Publishes when you cut a GitHub Release. Tag the release vX.Y.Z to match
# package.json's version — the build runs via the "prepare" script on npm publish.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-latest # package declares os:darwin; npm ci rejects linux
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No registry-url: that makes setup-node write an .npmrc wired for token
      # auth (NODE_AUTH_TOKEN), which shadows OIDC and 404s. Trusted Publishing
      # needs pure OIDC — just id-token:write above + npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
